<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 2rem; }
        .container { width: 100%; max-width: 600px; }
        h1 { font-size: 1.6rem; margin-bottom: 1.5rem; color: #1a202c; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        label { font-size: 0.85rem; color: #718096; display: block; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; margin-bottom: 12px; }
        button { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; color: white; }
        .btn-rest { background: #3182ce; }
        .btn-soap { background: #e53e3e; }
        .result { margin-top: 1.5rem; display: none; }
        .result.show { display: block; }
        .badge { display: inline-block; font-size: 0.75rem; padding: 2px 10px; border-radius: 99px; color: white; margin-bottom: 8px; }
        .badge.rest { background: #3182ce; }
        .badge.soap { background: #e53e3e; }
        .temp { font-size: 3rem; font-weight: 600; color: #1a202c; }
        .desc { color: #718096; margin-top: 4px; text-transform: capitalize; }
        .meta { display: flex; gap: 1rem; margin-top: 1rem; font-size: 0.9rem; color: #4a5568; }
        .error { color: #e53e3e; margin-top: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>🌤 Weather Dashboard</h1>

    <div class="card">
        <label>Ciudad (REST - OpenWeatherMap)</label>
        <input id="city-input" type="text" placeholder="Ej: Guatemala, London, Tokyo" />
        <button class="btn-rest" onclick="fetchREST()">Consultar vía REST</button>
    </div>

    <div class="card">
        <label>Código de país ISO (SOAP - CountryInfo)</label>
        <input id="zip-input" type="text" placeholder="Ej: GT, US, MX, JP" />
        <button class="btn-soap" onclick="fetchSOAP()">Consultar vía SOAP</button>
    </div>

    <div class="card result" id="result-card">
        <span class="badge" id="result-badge"></span>
        <div class="temp" id="result-temp"></div>
        <div class="desc" id="result-desc"></div>
        <div class="meta">
            <span id="result-city"></span>
            <span id="result-humidity"></span>
        </div>
    </div>

    <div class="error" id="error-msg"></div>
</div>

<script>
    async function fetchREST() {
        const city = document.getElementById('city-input').value.trim()
        if (!city) return
        await fetchWeather('/api/weather/rest?city=' + encodeURIComponent(city), 'REST')
    }

    async function fetchSOAP() {
        const zip = document.getElementById('zip-input').value.trim()
        if (!zip) return
        await fetchWeather('/api/weather/soap?country=' + encodeURIComponent(zip), 'SOAP')
    }

    async function fetchWeather(url, source) {
        document.getElementById('error-msg').textContent = ''
        document.getElementById('result-card').classList.remove('show')
        try {
            const res = await fetch(url)
            const data = await res.json()
            if (!res.ok) throw new Error(data.error || 'Error desconocido')
            document.getElementById('result-badge').textContent = source
            document.getElementById('result-badge').className = 'badge ' + source.toLowerCase()
            document.getElementById('result-temp').textContent = data.temperature.toFixed(1) + ' °C'
            document.getElementById('result-desc').textContent = data.description
            document.getElementById('result-city').textContent = '📍 ' + data.city + ', ' + data.country
            document.getElementById('result-humidity').textContent = '💧 ' + data.humidity + '% humedad'
            document.getElementById('result-card').classList.add('show')
        } catch(e) {
            document.getElementById('error-msg').textContent = '⚠ ' + e.message
        }
    }
</script>
</body>
</html>
